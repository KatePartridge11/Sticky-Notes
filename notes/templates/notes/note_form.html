{% extends 'notes/base.html' %}

{% block content %}
    <h2>{% if form.instance.pk %}Edit Note{% else %}Create New Note{% endif %}</h2>

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit">Save Note</button>
    </form>

    <br>
    <a href="{% url 'note_list' %}">Cancel</a>
{% endblock %}
